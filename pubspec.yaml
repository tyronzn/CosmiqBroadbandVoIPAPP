name: cosmiq_voip
description: Cosmiq Broadband VoIP Client — connects to voice.cosmiqbroadband.co.za
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # SIP is handled via native Android platform channel (Linphone SDK)
  # See android/app/src/main/kotlin for the native implementation

  # Networking / API
  http: ^1.2.0
  dio: ^5.4.0

  # State management
  provider: ^6.1.0

  # Secure storage for credentials
  flutter_secure_storage: ^9.2.0

  # Local storage for call history cache
  shared_preferences: ^2.2.0

  # Audio
  just_audio: ^0.9.36

  # Permissions
  permission_handler: ^11.3.0

  # Phone number formatting
  intl: ^0.19.0

  # Contacts (optional, for caller ID lookup)
  flutter_contacts: ^1.1.7+1

  # Connectivity check
  connectivity_plus: ^6.0.0

  # UUID generation
  uuid: ^4.3.0

  # Logging
  logger: ^2.0.2

  # URL launcher (for support links)
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
